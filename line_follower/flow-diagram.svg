<svg xmlns="http://www.w3.org/2000/svg" width="940" height="380" viewBox="0 0 940 380">
  <rect width="940" height="380" fill="#f8fafc"/>
  <text x="40" y="36" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#1f2937">Line Follower</text>
  <text x="40" y="62" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4b5563">Two IR sensors determine forward, left, right, or stop</text>

  <rect x="40" y="145" width="170" height="70" rx="12" fill="#dbeafe" stroke="#2563eb"/>
  <text x="125" y="172" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Read left and right</text>
  <text x="125" y="192" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">line sensors</text>

  <rect x="270" y="145" width="190" height="70" rx="12" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="365" y="172" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Evaluate sensor pair</text>
  <text x="365" y="192" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#374151">00, 10, 01, or 11</text>

  <rect x="530" y="40" width="170" height="70" rx="12" fill="#dcfce7" stroke="#16a34a"/>
  <text x="615" y="67" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">00</text>
  <text x="615" y="87" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Move forward</text>

  <rect x="530" y="135" width="170" height="70" rx="12" fill="#fef3c7" stroke="#d97706"/>
  <text x="615" y="162" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">10</text>
  <text x="615" y="182" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Turn left</text>

  <rect x="530" y="230" width="170" height="70" rx="12" fill="#fde68a" stroke="#ca8a04"/>
  <text x="615" y="257" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">01</text>
  <text x="615" y="277" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Turn right</text>

  <rect x="530" y="325" width="170" height="45" rx="12" fill="#fee2e2" stroke="#dc2626"/>
  <text x="615" y="353" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">11 -&gt; Stop</text>

  <line x1="210" y1="180" x2="270" y2="180" stroke="#374151" stroke-width="2"/>
  <polygon points="270,180 260,174 260,186" fill="#374151"/>

  <line x1="460" y1="165" x2="530" y2="90" stroke="#374151" stroke-width="2"/>
  <polygon points="530,90 520,89 523,99" fill="#374151"/>
  <text x="495" y="115" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#374151">00</text>

  <line x1="460" y1="180" x2="530" y2="170" stroke="#374151" stroke-width="2"/>
  <polygon points="530,170 520,165 521,176" fill="#374151"/>
  <text x="495" y="171" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#374151">10</text>

  <line x1="460" y1="195" x2="530" y2="260" stroke="#374151" stroke-width="2"/>
  <polygon points="530,260 520,254 523,264" fill="#374151"/>
  <text x="495" y="240" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#374151">01</text>

  <line x1="420" y1="215" x2="530" y2="345" stroke="#374151" stroke-width="2"/>
  <polygon points="530,345 520,339 522,350" fill="#374151"/>
  <text x="470" y="308" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#374151">11</text>
</svg>
