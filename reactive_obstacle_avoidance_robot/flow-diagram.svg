<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect width="960" height="420" fill="#f7fafc"/>
  <text x="40" y="36" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#1f2937">Reactive Obstacle Avoidance Robot</text>
  <text x="40" y="62" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4b5563">Distance-based speed control with servo scanning and differential turning</text>

  <rect x="40" y="100" width="180" height="60" rx="12" fill="#dbeafe" stroke="#2563eb"/>
  <text x="130" y="126" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Measure front</text>
  <text x="130" y="145" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">distance</text>

  <rect x="270" y="100" width="200" height="70" rx="12" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="370" y="127" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">distance &gt; 150 cm?</text>
  <text x="370" y="147" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#374151">Clear path check</text>

  <rect x="530" y="55" width="180" height="70" rx="12" fill="#dcfce7" stroke="#16a34a"/>
  <text x="620" y="82" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Set target speed</text>
  <text x="620" y="102" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">to 200 and drive</text>

  <rect x="530" y="155" width="180" height="85" rx="12" fill="#fef3c7" stroke="#d97706"/>
  <text x="620" y="182" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Reduce target speed</text>
  <text x="620" y="202" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">and begin scan</text>
  <text x="620" y="222" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#374151">Below braking range</text>

  <rect x="760" y="155" width="160" height="85" rx="12" fill="#fee2e2" stroke="#dc2626"/>
  <text x="840" y="182" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Scan left and</text>
  <text x="840" y="202" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">right with servo</text>
  <text x="840" y="222" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#374151">Compare distances</text>

  <rect x="760" y="285" width="160" height="85" rx="12" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="840" y="312" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Bias motors toward</text>
  <text x="840" y="332" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">clearer direction</text>
  <text x="840" y="352" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#374151">Left or right turn</text>

  <line x1="220" y1="130" x2="270" y2="130" stroke="#374151" stroke-width="2"/>
  <polygon points="270,130 260,124 260,136" fill="#374151"/>

  <line x1="470" y1="118" x2="530" y2="90" stroke="#374151" stroke-width="2"/>
  <polygon points="530,90 520,88 524,97" fill="#374151"/>
  <text x="500" y="95" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#374151">yes</text>

  <line x1="470" y1="152" x2="530" y2="185" stroke="#374151" stroke-width="2"/>
  <polygon points="530,185 520,178 518,188" fill="#374151"/>
  <text x="500" y="176" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#374151">no</text>

  <line x1="710" y1="197" x2="760" y2="197" stroke="#374151" stroke-width="2"/>
  <polygon points="760,197 750,191 750,203" fill="#374151"/>

  <line x1="840" y1="240" x2="840" y2="285" stroke="#374151" stroke-width="2"/>
  <polygon points="840,285 834,275 846,275" fill="#374151"/>

  <path d="M 620 125 L 620 385 L 130 385 L 130 160" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="6 5"/>
  <polygon points="130,160 124,170 136,170" fill="#6b7280"/>
  <text x="395" y="402" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4b5563">Loop repeats continuously</text>
</svg>
