<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect width="960" height="420" fill="#f8fafc"/>
  <text x="40" y="36" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#1f2937">Distance Indicator With LED</text>
  <text x="40" y="62" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4b5563">Ultrasonic measurement with green, yellow, and red indicator states</text>

  <rect x="40" y="130" width="180" height="70" rx="12" fill="#dbeafe" stroke="#2563eb"/>
  <text x="130" y="157" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Trigger ultrasonic</text>
  <text x="130" y="177" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">sensor and read echo</text>

  <rect x="280" y="130" width="180" height="70" rx="12" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="370" y="157" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Valid distance?</text>
  <text x="370" y="177" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#374151">Reject 0 or &gt; 400</text>

  <rect x="530" y="50" width="170" height="70" rx="12" fill="#f3f4f6" stroke="#6b7280"/>
  <text x="615" y="77" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Print "Out of range"</text>
  <text x="615" y="97" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">and wait for loop</text>

  <rect x="530" y="145" width="170" height="70" rx="12" fill="#dcfce7" stroke="#16a34a"/>
  <text x="615" y="172" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">distance &gt; 70 cm</text>
  <text x="615" y="192" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Green ON</text>

  <rect x="740" y="145" width="170" height="70" rx="12" fill="#fef3c7" stroke="#d97706"/>
  <text x="825" y="172" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">30 to 70 cm</text>
  <text x="825" y="192" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Yellow blink</text>

  <rect x="740" y="265" width="170" height="70" rx="12" fill="#fee2e2" stroke="#dc2626"/>
  <text x="825" y="292" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">30 cm or less</text>
  <text x="825" y="312" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Red fast blink</text>

  <line x1="220" y1="165" x2="280" y2="165" stroke="#374151" stroke-width="2"/>
  <polygon points="280,165 270,159 270,171" fill="#374151"/>

  <line x1="460" y1="145" x2="530" y2="95" stroke="#374151" stroke-width="2"/>
  <polygon points="530,95 520,93 524,102" fill="#374151"/>
  <text x="490" y="112" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#374151">no</text>

  <line x1="460" y1="180" x2="530" y2="180" stroke="#374151" stroke-width="2"/>
  <polygon points="530,180 520,174 520,186" fill="#374151"/>
  <text x="490" y="172" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#374151">yes</text>

  <line x1="700" y1="180" x2="740" y2="180" stroke="#374151" stroke-width="2"/>
  <polygon points="740,180 730,174 730,186" fill="#374151"/>
  <text x="720" y="172" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#374151">else</text>

  <line x1="825" y1="215" x2="825" y2="265" stroke="#374151" stroke-width="2"/>
  <polygon points="825,265 819,255 831,255" fill="#374151"/>
  <text x="835" y="245" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#374151">else</text>

  <path d="M 615 120 L 615 380 L 130 380 L 130 200" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="6 5"/>
  <polygon points="130,200 124,210 136,210" fill="#6b7280"/>
  <text x="430" y="398" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4b5563">All branches return to the next measurement cycle</text>
</svg>
