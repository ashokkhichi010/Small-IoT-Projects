<svg xmlns="http://www.w3.org/2000/svg" width="940" height="360" viewBox="0 0 940 360">
  <rect width="940" height="360" fill="#f8fafc"/>
  <text x="40" y="36" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#1f2937">Bluetooth Controled RC Car</text>
  <text x="40" y="62" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4b5563">Read a Bluetooth character and map it to a motor action</text>

  <rect x="40" y="130" width="170" height="70" rx="12" fill="#dbeafe" stroke="#2563eb"/>
  <text x="125" y="157" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Check Bluetooth</text>
  <text x="125" y="177" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">data available</text>

  <rect x="260" y="130" width="180" height="70" rx="12" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="350" y="157" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Read one command</text>
  <text x="350" y="177" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">character</text>

  <rect x="500" y="80" width="180" height="70" rx="12" fill="#dcfce7" stroke="#16a34a"/>
  <text x="590" y="107" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">F B L R S</text>
  <text x="590" y="127" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Basic motion commands</text>

  <rect x="500" y="190" width="180" height="70" rx="12" fill="#fef3c7" stroke="#d97706"/>
  <text x="590" y="217" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">G I H J</text>
  <text x="590" y="237" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Diagonal commands</text>

  <rect x="740" y="135" width="160" height="80" rx="12" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="820" y="162" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Drive motors with</text>
  <text x="820" y="182" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">fixed speed or</text>
  <text x="820" y="202" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">half-speed diagonal</text>

  <line x1="210" y1="165" x2="260" y2="165" stroke="#374151" stroke-width="2"/>
  <polygon points="260,165 250,159 250,171" fill="#374151"/>
  <line x1="440" y1="145" x2="500" y2="115" stroke="#374151" stroke-width="2"/>
  <polygon points="500,115 490,113 494,122" fill="#374151"/>
  <line x1="440" y1="185" x2="500" y2="225" stroke="#374151" stroke-width="2"/>
  <polygon points="500,225 490,218 488,228" fill="#374151"/>
  <line x1="680" y1="115" x2="740" y2="155" stroke="#374151" stroke-width="2"/>
  <polygon points="740,155 730,148 728,158" fill="#374151"/>
  <line x1="680" y1="225" x2="740" y2="195" stroke="#374151" stroke-width="2"/>
  <polygon points="740,195 730,194 735,203" fill="#374151"/>

  <path d="M 820 215 L 820 295 L 125 295 L 125 200" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="6 5"/>
  <polygon points="125,200 119,210 131,210" fill="#6b7280"/>
  <text x="475" y="322" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4b5563">The car waits for the next Bluetooth command and keeps the last motion until then</text>
</svg>
